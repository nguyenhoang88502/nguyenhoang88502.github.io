<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Extractor Utility - Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --navy:    #080f1a;
            --navy2:   #0d1626;
            --navy3:   #121e30;
            --gold:    #c8922a;
            --gold-lt: #e8b84b;
            --cream:   #f0ece4;
            --muted:   #7a8fa6;
            --card-bg: #101c2e;
            --line:    rgba(200,146,42,.18);
            --success: #75b798;
            --error:   #ea868f;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: #ccd8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .section-label { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: .6rem; }
        .section-title  { font-family: 'Cormorant', serif; font-size: 2.2rem; font-weight: 600; color: var(--cream); line-height: 1.1; }

        .tool-card {
            background: var(--card-bg); border: 1px solid var(--line); border-radius: 6px; padding: 2.5rem;
            position: relative; z-index: 1; width: 100%; max-width: 850px; box-shadow: 0 20px 40px rgba(0,0,0,.3);
        }

        .custom-control {
            background: var(--navy3); border: 1px solid var(--line); color: var(--muted);
            padding: 0.4rem; border-radius: 2px; font-size: 0.85rem; cursor: pointer; outline: none;
            max-width: 100%; /* Prevents text overflow blowouts */
        }
        .custom-control:focus { border-color: var(--gold); }

        input[type="file"] { 
            flex-grow: 1; 
            overflow: hidden; /* Hide overflow text */
            text-overflow: ellipsis; 
            white-space: nowrap;
        }
        input[type="file"]::file-selector-button {
            background: var(--navy2); border: 1px solid var(--line); color: var(--gold);
            padding: 0.4rem 1rem; margin-right: 1rem; border-radius: 2px; cursor: pointer;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: .1em;
        }

        .btn-gold {
            display: inline-flex; align-items: center; justify-content: center; gap: .5rem; background: var(--gold); color: var(--navy);
            font-weight: 600; font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
            border: none; padding: .85rem 2rem; border-radius: 2px; transition: all .2s; cursor: pointer;
        }
        .btn-gold:hover:not(:disabled) { background: var(--gold-lt); transform: translateY(-2px); }
        .btn-gold:disabled { background: #4a3e23; color: #8a7b60; cursor: not-allowed; }

        .btn-stop {
            display: none; align-items: center; justify-content: center; gap: .5rem; background: transparent; color: var(--error);
            font-weight: 600; font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
            border: 1px solid var(--error); padding: .85rem 2rem; border-radius: 2px;
            transition: all .2s; cursor: pointer;
        }
        .btn-stop:hover:not(:disabled) { background: rgba(234,134,143,.1); transform: translateY(-2px); }
        .btn-stop.visible { display: inline-flex; }

        .btn-ghost {
            display: inline-flex; align-items: center; gap: .5rem; background: transparent; color: var(--muted);
            font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; border: 1px solid var(--line);
            padding: .5rem 1rem; border-radius: 2px; transition: all .2s; cursor: pointer;
            flex-grow: 1; /* Makes buttons fill available space evenly */
            justify-content: center;
        }
        .btn-ghost:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
        .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

        textarea {
            width: 100%; height: 280px; background: var(--navy2); border: 1px solid var(--line);
            color: var(--cream); padding: 1rem; border-radius: 2px; font-family: monospace;
            font-size: 0.85rem; line-height: 1.6; resize: vertical; margin-bottom: 1.5rem;
        }
        textarea:focus { outline: none; border-color: var(--gold); }

        .status-text { font-size: 0.8rem; letter-spacing: .05em; color: var(--gold-lt); min-height: 1.5rem; }
        .divider { width: 100%; height: 1px; background: linear-gradient(90deg, var(--line), transparent); margin: 1.5rem 0; }

        /* ── Progress ── */
        .progress-wrap { margin: 0.75rem 0 0.5rem; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
        .progress-label { font-size: 0.68rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
        .progress-pct   { font-size: 0.75rem; font-weight: 600; color: var(--gold-lt); font-variant-numeric: tabular-nums; }
        .progress-track { width: 100%; height: 3px; background: rgba(200,146,42,.12); border-radius: 2px; overflow: hidden; position: relative; }
        .progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--gold-lt));
            border-radius: 2px; transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .progress-fill::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,.25) 50%, transparent 70%);
            animation: shimmer 1.4s infinite;
        }
        .progress-fill.done::after { display: none; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }

        /* ── Mobile Optimization ── */
        @media (max-width: 575px) { 
            body { 
                padding: 1rem; 
                align-items: flex-start; /* Allows scrolling if card is taller than screen */
            } 
            .tool-card { 
                padding: 1.25rem; /* Reclaim screen space */
            }
            .section-title {
                font-size: 1.8rem; /* Slightly smaller title */
            }
            /* Stack controls for touch friendliness */
            .custom-control, .btn-gold, .btn-stop {
                width: 100%;
                margin-right: 0;
            }
            .d-flex.flex-wrap.gap-2.mb-2 {
                flex-direction: column; /* Force vertical stacking of the main inputs */
            }
        }
    </style>
</head>
<body>

    <div class="tool-card">
        <span class="section-label">System Utility — OCR Engine</span>
        <h2 class="section-title">Document OCR Engine</h2>
        <p style="color: var(--muted); font-size: 0.9rem; margin: 0.5rem 0 1.5rem;">
            Pages are rasterized at 3.0× with contrast enhancement and processed in the background.
        </p>

        <div class="d-flex flex-wrap gap-2 mb-2">
            <input type="file" id="pdfInput" class="custom-control" accept="application/pdf">
            <select id="langSelect" class="custom-control">
                <option value="eng+vie">English + Vietnamese</option>
                <option value="eng+chi_sim">English + Chinese (Simplified)</option>
                <option value="eng">English Only</option>
                <option value="vie">Vietnamese Only</option>
            </select>
            <button id="startBtn" class="btn-gold"><i class="bi bi-cpu-fill"></i> Execute</button>
            <button id="stopBtn"  class="btn-stop"><i class="bi bi-stop-fill"></i> Abort</button>
        </div>

        <div class="progress-wrap" id="progressWrap" style="display:none;">
            <div class="progress-header">
                <span class="progress-label" id="progressLabel">Initializing…</span>
                <span class="progress-pct"   id="progressPct">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="status-text mt-2" id="statusText">Awaiting input file…</div>
        <div class="divider"></div>

        <textarea id="resultText" placeholder="// Extracted output will compile here…" readonly></textarea>

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
            <span class="section-label mb-0 w-100">Export Format:</span>
            <div class="d-flex gap-2 flex-wrap w-100">
                <button id="btnWord" class="btn-ghost" disabled><i class="bi bi-file-word"></i> Word</button>
                <button id="btnMd"   class="btn-ghost" disabled><i class="bi bi-markdown"></i> Markdown</button>
                <button id="btnHtml" class="btn-ghost" disabled><i class="bi bi-filetype-html"></i> HTML</button>
                <button id="btnPdf"  class="btn-ghost" disabled><i class="bi bi-file-pdf"></i> PDF</button>
                <button id="btnJson" class="btn-ghost" disabled><i class="bi bi-filetype-json"></i> JSON</button>
                <button id="btnTxt"  class="btn-ghost" disabled><i class="bi bi-filetype-txt"></i> Text</button>
            </div>
        </div>
    </div>

    <script>
    /* ══ PDF.js ══ */
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    /* ══ DOM ══ */
    const $ = id => document.getElementById(id);
    const pdfInput       = $('pdfInput');
    const langSelect     = $('langSelect');
    const startBtn       = $('startBtn');
    const stopBtn        = $('stopBtn');
    const statusText     = $('statusText');
    const resultText     = $('resultText');
    const progressWrap   = $('progressWrap');
    const progressLabel  = $('progressLabel');
    const progressPct    = $('progressPct');
    const progressFill   = $('progressFill');
    const exportBtns = {
        word: $('btnWord'), md: $('btnMd'), html: $('btnHtml'),
        pdf:  $('btnPdf'),  json: $('btnJson'), txt: $('btnTxt'),
    };

    /* ══ Config ══ */
    const POOL_SIZE = Math.max(2, Math.min(navigator.hardwareConcurrency || 4, 6));

    let extractedFullText = '';
    let abortFlag = false;

    /* ══ Progress helpers ══ */
    function showProgress(v) { progressWrap.style.display = v ? 'block' : 'none'; }

    function setProgress(done, total, lbl) {
        const pct = total ? Math.round((done / total) * 100) : 0;
        progressFill.style.width = pct + '%';
        progressPct.textContent  = pct + '%';
        if (lbl) progressLabel.textContent = lbl;
        progressFill.classList.toggle('done', pct >= 100);
    }

    /* ══ Worker pool ══ */
    async function buildPool(lang, size) {
        return Promise.all(
            Array.from({ length: size }, async () => {
                const w = await Tesseract.createWorker(lang);
                await w.setParameters({
                    tessedit_pageseg_mode: Tesseract.PSM.AUTO,
                    preserve_interword_spaces: '1',
                });
                return w;
            })
        );
    }

    async function teardownPool(pool) {
        await Promise.allSettled(pool.map(w => w.terminate()));
    }

    /* ══ Render one PDF page → object URL ══ */
    async function renderPage(pdfPage) {
        const viewport = pdfPage.getViewport({ scale: 3.0 });
        let canvas, ctx;

        if (typeof OffscreenCanvas !== 'undefined') {
            canvas = new OffscreenCanvas(viewport.width, viewport.height);
            ctx    = canvas.getContext('2d', { willReadFrequently: true });
        } else {
            canvas        = document.createElement('canvas');
            canvas.width  = viewport.width;
            canvas.height = viewport.height;
            ctx = canvas.getContext('2d', { willReadFrequently: true });
        }

        ctx.filter = 'grayscale(100%) contrast(150%)';
        await pdfPage.render({ canvasContext: ctx, viewport }).promise;

        if (canvas instanceof OffscreenCanvas) {
            const blob = await canvas.convertToBlob({ type: 'image/png' });
            return URL.createObjectURL(blob);
        }
        return canvas.toDataURL('image/png');
    }

    /* ══ Status helper ══ */
    function setStatus(msg, color = 'var(--gold-lt)') {
        statusText.textContent = msg;
        statusText.style.color = color;
    }

    /* ══ Main execute ══ */
    startBtn.addEventListener('click', async () => {
        const file = pdfInput.files[0];
        if (!file) { setStatus('[ERROR] No file selected.', 'var(--error)'); return; }

        abortFlag = false;
        extractedFullText = '';
        resultText.value  = '';
        toggleExports(true);
        startBtn.disabled = true;
        stopBtn.classList.add('visible');
        setStatus('Initializing engine…');
        showProgress(true);
        setProgress(0, 1, 'Preparing environment…');

        const lang = langSelect.value;
        let pool = [];
        let completed = 0;
        let numPages  = 0;
        const pageResults = [];

        try {
            const fileURL = URL.createObjectURL(file);
            const pdf = await pdfjsLib.getDocument({
                url: fileURL,
                disableRange:  false,
                disableStream: false,
            }).promise;
            numPages = pdf.numPages;
            pageResults.length = numPages;

            setStatus('Loading language models…');
            pool = await buildPool(lang, POOL_SIZE);

            if (abortFlag) throw new DOMException('', 'AbortError');

            setProgress(0, numPages, `Processing 0 / ${numPages} pages`);
            setStatus('Extracting text in background…', 'var(--gold-lt)');

            const queue = Array.from({ length: numPages }, (_, i) => i + 1);

            async function workerTask(worker) {
                while (queue.length > 0 && !abortFlag) {
                    const pageNum = queue.shift();
                    if (pageNum === undefined) break;

                    const page   = await pdf.getPage(pageNum);
                    const imgURL = await renderPage(page);

                    if (abortFlag) { if (imgURL.startsWith('blob:')) URL.revokeObjectURL(imgURL); break; }

                    const ocr = await worker.recognize(imgURL);
                    if (imgURL.startsWith('blob:')) URL.revokeObjectURL(imgURL);

                    pageResults[pageNum - 1] = ocr.data.text;
                    completed++;

                    setProgress(completed, numPages, `Processing ${completed} / ${numPages} pages`);

                    const orderedSoFar = pageResults.filter(t => t !== undefined).join('\n\n');
                    resultText.value = orderedSoFar;
                    resultText.scrollTop = resultText.scrollHeight;
                }
            }

            await Promise.all(pool.map(w => workerTask(w)));

            if (abortFlag) {
                setStatus('Operation aborted.', 'var(--muted)');
                setProgress(completed, numPages, 'Aborted');
            } else {
                extractedFullText = pageResults.filter(Boolean).join('\n\n');
                resultText.value  = extractedFullText;
                setStatus('Operation complete. Ready for export.', 'var(--success)');
                setProgress(numPages, numPages, `Complete — ${numPages} page${numPages !== 1 ? 's' : ''} extracted`);
                toggleExports(false);
            }

        } catch (err) {
            if (err.name === 'AbortError') {
                setStatus('Operation aborted.', 'var(--muted)');
            } else {
                console.error(err);
                setStatus('System Fault: ' + err.message, 'var(--error)');
            }
        } finally {
            await teardownPool(pool);
            startBtn.disabled = false;
            stopBtn.classList.remove('visible');
        }
    });

    stopBtn.addEventListener('click', () => {
        abortFlag = true;
        setStatus('Aborting — finishing current page…', 'var(--muted)');
        stopBtn.disabled = true;
        setTimeout(() => stopBtn.disabled = false, 2000);
    });

    /* ══ Exports ══ */
    function toggleExports(disable) {
        Object.values(exportBtns).forEach(b => b.disabled = disable);
    }

    async function smartExport(content, filename, mimeType, description, extension) {
        if ('showSaveFilePicker' in window) {
            try {
                const fh = await window.showSaveFilePicker({
                    suggestedName: filename,
                    types: [{ description, accept: { [mimeType]: [extension] } }],
                });
                const wr = await fh.createWritable();
                await wr.write(content);
                await wr.close();
                return;
            } catch (e) { if (e.name !== 'AbortError') console.error(e); return; }
        }
        const blob = content instanceof Blob ? content : new Blob([content], { type: mimeType });
        const url  = URL.createObjectURL(blob);
        const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    exportBtns.word.addEventListener('click', async () => {
        const h = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export</title></head><body>";
        await smartExport(h + extractedFullText.replace(/\n/g, '<br>') + '</body></html>',
            'document_extract.doc', 'application/msword', 'Word Document', '.doc');
    });

    exportBtns.md.addEventListener('click', async () => {
        await smartExport(extractedFullText, 'document_extract.md', 'text/markdown', 'Markdown File', '.md');
    });

    exportBtns.html.addEventListener('click', async () => {
        const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Extracted Data</title><style>body{font-family:monospace;padding:2rem;background:#0d1626;color:#f0ece4;white-space:pre-wrap;}</style></head><body>${extractedFullText}</body></html>`;
        await smartExport(html, 'document_extract.html', 'text/html', 'HTML Document', '.html');
    });

    exportBtns.pdf.addEventListener('click', async () => {
        const { jsPDF } = window.jspdf;
        const doc   = new jsPDF();
        const split = doc.splitTextToSize(extractedFullText, 180);
        let y = 10;
        for (const line of split) {
            if (y > 280) { doc.addPage(); y = 10; }
            doc.text(line, 10, y); y += 6;
        }
        await smartExport(doc.output('blob'), 'document_extract.pdf', 'application/pdf', 'PDF Document', '.pdf');
    });

    exportBtns.json.addEventListener('click', async () => {
        const data = { source: pdfInput.files[0].name, timestamp: new Date().toISOString(), payload: extractedFullText };
        await smartExport(JSON.stringify(data, null, 2), 'document_extract.json', 'application/json', 'JSON File', '.json');
    });

    exportBtns.txt.addEventListener('click', async () => {
        await smartExport(extractedFullText, 'document_extract.txt', 'text/plain', 'Text Document', '.txt');
    });

    </script>
</body>
</html>
