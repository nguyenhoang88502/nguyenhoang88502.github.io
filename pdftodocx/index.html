<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Extractor Utility - Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* ══ TOKENS ══ */
        :root {
            --navy:    #080f1a;
            --navy2:   #0d1626;
            --navy3:   #121e30;
            --gold:    #c8922a;
            --gold-lt: #e8b84b;
            --cream:   #f0ece4;
            --muted:   #7a8fa6;
            --card-bg: #101c2e;
            --line:    rgba(200,146,42,.18);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: #ccd8e8;
            cursor: none;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        body::before {
            content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: .028;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        #cursor {
            position: fixed; width: 8px; height: 8px; background: var(--gold); border-radius: 50%;
            pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); mix-blend-mode: screen;
        }
        #cursor-ring {
            position: fixed; width: 32px; height: 32px; border: 1px solid rgba(200,146,42,.5);
            border-radius: 50%; pointer-events: none; z-index: 9997; transform: translate(-50%, -50%);
            transition: width .25s, height .25s;
        }
        a:hover ~ #cursor-ring, button:hover ~ #cursor-ring, input:hover ~ #cursor-ring, select:hover ~ #cursor-ring { 
            width: 48px; height: 48px; border-color: rgba(200,146,42,.8);
        }

        .hero-mesh {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 65% 55% at 75% 38%, rgba(200,146,42,.06) 0%, transparent 55%),
                        radial-gradient(ellipse 45% 45% at 15% 75%, rgba(20,80,180,.05) 0%, transparent 55%);
        }

        .section-label { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: .6rem; }
        .section-title { font-family: 'Cormorant', serif; font-size: 2.2rem; font-weight: 600; color: var(--cream); line-height: 1.1; }

        .tool-card {
            background: var(--card-bg); border: 1px solid var(--line); border-radius: 6px; padding: 2.5rem;
            position: relative; z-index: 1; width: 100%; max-width: 850px; box-shadow: 0 20px 40px rgba(0,0,0,.3);
        }

        .custom-control {
            background: var(--navy3); border: 1px solid var(--line); color: var(--muted);
            padding: 0.4rem; border-radius: 2px; font-size: 0.85rem; cursor: pointer; outline: none;
        }
        .custom-control:focus { border-color: var(--gold); }
        
        input[type="file"] { flex-grow: 1; }
        input[type="file"]::file-selector-button {
            background: var(--navy2); border: 1px solid var(--line); color: var(--gold);
            padding: 0.4rem 1rem; margin-right: 1rem; border-radius: 2px; cursor: pointer;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: .1em;
        }

        select.custom-control { padding-right: 2.5rem; }

        .btn-gold {
            display: inline-flex; align-items: center; gap: .5rem; background: var(--gold); color: var(--navy);
            font-weight: 600; font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
            border: none; padding: .85rem 2rem; border-radius: 2px; transition: all .2s;
        }
        .btn-gold:hover:not(:disabled) { background: var(--gold-lt); transform: translateY(-2px); }
        .btn-gold:disabled { background: #4a3e23; color: #8a7b60; cursor: not-allowed; }

        .btn-ghost {
            display: inline-flex; align-items: center; gap: .5rem; background: transparent; color: var(--muted);
            font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; border: 1px solid var(--line);
            padding: .5rem 1rem; border-radius: 2px; transition: all .2s;
        }
        .btn-ghost:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
        .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

        textarea {
            width: 100%; height: 280px; background: var(--navy2); border: 1px solid var(--line);
            color: var(--cream); padding: 1rem; border-radius: 2px; font-family: monospace;
            font-size: 0.85rem; line-height: 1.6; resize: vertical; margin-bottom: 1.5rem;
        }
        textarea:focus { outline: none; border-color: var(--gold); }

        .status-text { font-size: 0.8rem; letter-spacing: .05em; color: var(--gold-lt); min-height: 1.5rem; margin-top: 0.5rem; }
        .divider { width: 100%; height: 1px; background: linear-gradient(90deg, var(--line), transparent); margin: 1.5rem 0; }

        /* Hide cursor functionality on small screens */
        @media (max-width: 575px) { body { cursor: auto; padding: 1rem; } #cursor, #cursor-ring { display: none; } }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <div class="hero-mesh"></div>

    <div class="tool-card">
        <span class="section-label">System Utility</span>
        <h2 class="section-title">Document OCR Engine</h2>
        <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem;">
            Upload a PDF document. The engine will rasterize the pages at 3.0x scale with contrast enhancement and extract text using neural net OCR.
        </p>

        <div class="d-flex flex-wrap gap-2 mb-2">
            <input type="file" id="pdfInput" class="custom-control" accept="application/pdf">
            <select id="langSelect" class="custom-control">
                <option value="eng+vie">English + Vietnamese</option>
                <option value="eng+chi_sim">English + Chinese (Simplified)</option>
                <option value="eng">English Only</option>
                <option value="vie">Vietnamese Only</option>
            </select>
            <button id="startBtn" class="btn-gold"><i class="bi bi-cpu-fill"></i> Execute</button>
        </div>
        
        <div class="status-text" id="statusText">Awaiting input file...</div>
        
        <textarea id="resultText" placeholder="// Extracted output will compile here..." readonly></textarea>

        <div class="divider"></div>

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
            <span class="section-label mb-0">Export Format:</span>
            <div class="d-flex gap-2 flex-wrap">
                <button id="btnWord" class="btn-ghost" disabled><i class="bi bi-file-word"></i> Word</button>
                <button id="btnMd" class="btn-ghost" disabled><i class="bi bi-markdown"></i> Markdown</button>
                <button id="btnHtml" class="btn-ghost" disabled><i class="bi bi-filetype-html"></i> HTML</button>
                <button id="btnPdf" class="btn-ghost" disabled><i class="bi bi-file-pdf"></i> PDF</button>
                <button id="btnJson" class="btn-ghost" disabled><i class="bi bi-filetype-json"></i> JSON</button>
                <button id="btnTxt" class="btn-ghost" disabled><i class="bi bi-filetype-txt"></i> Text</button>
            </div>
        </div>
    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        /* Cursor Logic */
        const cursor = document.getElementById('cursor'), ring = document.getElementById('cursor-ring');
        let mx = -100, my = -100, rx = -100, ry = -100;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        function animateCursor() {
            cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
            rx += (mx - rx) * .12; ry += (my - ry) * .12;
            ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        /* OCR Logic */
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfInput = document.getElementById('pdfInput');
        const langSelect = document.getElementById('langSelect');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');
        const resultText = document.getElementById('resultText');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

        // Export Buttons
        const btns = {
            word: document.getElementById('btnWord'),
            md: document.getElementById('btnMd'),
            html: document.getElementById('btnHtml'),
            pdf: document.getElementById('btnPdf'),
            json: document.getElementById('btnJson'),
            txt: document.getElementById('btnTxt')
        };

        let extractedFullText = "";

        startBtn.addEventListener('click', async () => {
            const file = pdfInput.files[0];
            const targetLanguage = langSelect.value;

            if (!file) {
                statusText.innerText = "[ERROR] No file selected.";
                statusText.style.color = "#d9534f";
                return;
            }

            extractedFullText = "";
            resultText.value = "";
            statusText.style.color = "var(--gold-lt)";
            startBtn.disabled = true;
            toggleExports(true);

            try {
                statusText.innerText = "Initializing PDF parser...";
                const fileURL = URL.createObjectURL(file);
                const pdf = await pdfjsLib.getDocument(fileURL).promise;
                const numPages = pdf.numPages;

                for (let i = 1; i <= numPages; i++) {
                    statusText.innerText = `Rendering geometry... Page ${i} of ${numPages}`;
                    
                    const page = await pdf.getPage(i);
                    // ACCURACY BOOST 1: Render at 3.0 scale instead of 2.0
                    const viewport = page.getViewport({ scale: 3.0 }); 
                    
                    hiddenCanvas.height = viewport.height;
                    hiddenCanvas.width = viewport.width;

                    // ACCURACY BOOST 2: Apply CSS filter to canvas to increase contrast for Tesseract
                    ctx.filter = 'grayscale(100%) contrast(150%)';
                    
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    const imageData = hiddenCanvas.toDataURL('image/png');

                    statusText.innerText = `Running Tesseract Neural Net... Page ${i} of ${numPages}`;
                    
                    const worker = await Tesseract.createWorker(targetLanguage);
                    
                    // ACCURACY BOOST 3 & LAYOUT PRESERVATION
                    await worker.setParameters({ 
                        tessedit_pageseg_mode: Tesseract.PSM.AUTO, 
                        preserve_interword_spaces: '1' 
                    });
                    
                    const ret = await worker.recognize(imageData);
                    const text = ret.data.text;
                    await worker.terminate();

                    extractedFullText += text + `\n\n`;
                    resultText.value = extractedFullText;
                    resultText.scrollTop = resultText.scrollHeight;
                }

                statusText.innerText = "Operation complete. Ready for export.";
                statusText.style.color = "#75b798";
                toggleExports(false);

            } catch (error) {
                console.error(error);
                statusText.innerText = "System Fault: " + error.message;
                statusText.style.color = "#ea868f";
            } finally {
                startBtn.disabled = false;
            }
        });

        /* Progressive Enhancement Export Engine */
        async function smartExport(content, filename, mimeType, description, extension) {
            // 1. Native File System Access API (Vivaldi/Chromium)
            if ('showSaveFilePicker' in window) {
                try {
                    const fileHandle = await window.showSaveFilePicker({
                        suggestedName: filename,
                        types: [{
                            description: description,
                            accept: { [mimeType]: [extension] },
                        }],
                    });
                    const writable = await fileHandle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    return;
                } catch (err) {
                    // Fail silently if the user just closes the save prompt
                    if (err.name !== 'AbortError') console.error(err);
                    return;
                }
            }

            // 2. Standard Fallback Download (Safari, Firefox)
            const blob = content instanceof Blob ? content : new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function toggleExports(disable) {
            Object.values(btns).forEach(btn => btn.disabled = disable);
        }

        /* ── Word (.doc via HTML mapping) ── */
        btns.word.addEventListener('click', async () => {
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export</title></head><body>";
            const footer = "</body></html>";
            const bodyText = extractedFullText.replace(/\n/g, '<br>');
            await smartExport(header + bodyText + footer, 'document_extract.doc', 'application/msword', 'Word Document', '.doc');
        });

        /* ── Markdown (.md) ── */
        btns.md.addEventListener('click', async () => {
            await smartExport(extractedFullText, 'document_extract.md', 'text/markdown', 'Markdown File', '.md');
        });

        /* ── HTML (.html) ── */
        btns.html.addEventListener('click', async () => {
            const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Extracted Data</title><style>body{font-family:monospace;padding:2rem;background:#0d1626;color:#f0ece4;white-space:pre-wrap;}</style></head><body>${extractedFullText}</body></html>`;
            await smartExport(html, 'document_extract.html', 'text/html', 'HTML Document', '.html');
        });

        /* ── PDF (.pdf using jsPDF) ── */
        btns.pdf.addEventListener('click', async () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const splitText = doc.splitTextToSize(extractedFullText, 180);
            let y = 10; 
            for (let i = 0; i < splitText.length; i++) {
                if (y > 280) { 
                    y = 10;
                    doc.addPage();
                }
                doc.text(splitText[i], 10, y);
                y += 6; 
            }
            
            // Intercept jsPDF output to run through our smartExport system
            const pdfBlob = doc.output('blob');
            await smartExport(pdfBlob, 'document_extract.pdf', 'application/pdf', 'PDF Document', '.pdf');
        });

        /* ── JSON (.json) ── */
        btns.json.addEventListener('click', async () => {
            const data = { source: pdfInput.files[0].name, timestamp: new Date().toISOString(), payload: extractedFullText };
            await smartExport(JSON.stringify(data, null, 2), 'document_extract.json', 'application/json', 'JSON File', '.json');
        });

        /* ── Text (.txt) ── */
        btns.txt.addEventListener('click', async () => {
            await smartExport(extractedFullText, 'document_extract.txt', 'text/plain', 'Text Document', '.txt');
        });

    </script>
</body>
</html>
