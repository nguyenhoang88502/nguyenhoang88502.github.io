<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoCAD 2D Engineering Graphics</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Inter,sans-serif}
</style>
</head>

<body class="bg-gray-50 text-gray-900">

<div class="max-w-6xl mx-auto py-20 px-6">

<h1 class="text-4xl font-bold mb-6">
AutoCAD 2D Engineering Graphics
</h1>

<p class="text-gray-600 mb-12 max-w-3xl">
Engineering drawings including orthographic projection,
mechanical components and structural models.
</p>

<div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></div>

<a href="../index.html" class="inline-block mt-16 text-blue-600 font-semibold">
← Back to Portfolio
</a>

</div>

<script>

const files = [

"ConLanTreoCap_NguyenHuyHoang_2311054-Model1",
"ConLanTreoCap_NguyenHuyHoang_2311054-Model2",
"ConLanTreoCap_NguyenHuyHoang_2311054-Model3",
"ConLanTreoCap_NguyenHuyHoang_2311054-Model4",
"ConLanTreoCap_NguyenHuyHoang_2311054-Model5",
"ConLanTreoCap_NguyenHuyHoang_2311054-Model6",
"ConLanTreoCap_NguyenHuyHoang_2311054-Model7",
"ConLanTreoCap_NguyenHuyHoang_2311054-Model8",

"L27-2311054-NguyenHuyHoang-Baitap2va3-Model",
"L27-2311054-NguyenHuyHoang-BaiThucHanhSo4-Model",
"L27-2311054-NguyenHuyHoang-BT1-Model",
"L27-2311054-NguyenHuyHoang-DeThiThuSo7Buoi4-Model"

]

const gallery = document.getElementById("gallery")

files.forEach(name => {

gallery.innerHTML += `

<a href="${name}.pdf" target="_blank"
class="group bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden">

<img src="${name}.jpg"
class="w-full h-48 object-cover">

<div class="p-4">
<h3 class="text-sm font-semibold break-words group-hover:text-blue-600">
${name.replace(/-/g," ")}
</h3>
</div>

</a>

`

})

</script>

</body>
</html>
