<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trimmer Assembly — Monte Carlo Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;600&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --surface2:  #1e2333;
      --border:    #252b3b;
      --amber:     #f59e0b;
      --amber-dim: #92610a;
      --amber-bg:  rgba(245,158,11,0.08);
      --green:     #22c55e;
      --green-bg:  rgba(34,197,94,0.08);
      --red:       #ef4444;
      --blue:      #3b82f6;
      --purple:    #a855f7;
      --muted:     #6b7280;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --mono:      'IBM Plex Mono', monospace;
      --head:      'Barlow Condensed', sans-serif;
      --body:      'Barlow', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; gap: 20px;
      height: 60px;
    }
    .brand {
      font-family: var(--head); font-size: 22px; font-weight: 900;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--amber);
    }
    .brand-sub {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      letter-spacing: 0.05em;
    }
    .header-pill {
      margin-left: auto;
      background: var(--amber-bg); border: 1px solid var(--amber-dim);
      color: var(--amber); padding: 4px 12px; border-radius: 999px;
      font-family: var(--head); font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* ── LAYOUT ── */
    .workspace {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 28px 60px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── PANELS ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-family: var(--head); font-size: 13px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }
    .panel-body { padding: 20px; }

    /* ── TASK LIST ── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr 72px 72px 72px 32px;
      gap: 8px;
      align-items: center;
      transition: border-color 0.2s;
    }
    .task-row:hover { border-color: #374151; }

    .task-name-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--head); font-size: 16px; font-weight: 600;
      letter-spacing: 0.02em; width: 100%;
      padding: 2px 0;
    }
    .task-name-input:focus { outline: none; color: var(--amber); }

    .num-group { display: flex; flex-direction: column; align-items: center; }
    .num-label {
      font-family: var(--mono); font-size: 9px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px;
    }
    .num-input {
      width: 100%; padding: 6px 6px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: var(--mono); font-size: 13px; text-align: center;
      transition: border-color 0.2s;
    }
    .num-input:focus { outline: none; border-color: var(--amber); }
    .num-input.opt:focus { border-color: var(--green); }
    .num-input.pess:focus { border-color: var(--red); }

    .del-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 18px; line-height: 1;
      padding: 4px; border-radius: 4px;
      transition: color 0.15s;
    }
    .del-btn:hover { color: var(--red); }

    /* task info from data collection */
    .task-badge {
      grid-column: 1 / -1;
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      background: var(--bg); padding: 3px 8px; border-radius: 4px;
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .task-badge span { color: var(--text-dim); }

    .add-task-btn {
      width: 100%;
      padding: 10px;
      background: transparent; border: 1px dashed var(--border);
      color: var(--muted); border-radius: 8px;
      font-family: var(--head); font-size: 14px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .add-task-btn:hover { border-color: var(--amber); color: var(--amber); }

    .task-controls {
      margin-top: 18px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .run-btn {
      flex: 1; padding: 14px 20px;
      background: var(--amber); color: #1a0f00;
      border: none; border-radius: 8px;
      font-family: var(--head); font-size: 18px; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.15s;
    }
    .run-btn:hover { opacity: 0.9; }
    .run-btn:active { opacity: 0.75; }

    .iter-group {
      display: flex; align-items: center; gap: 8px;
    }
    .iter-label {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      white-space: nowrap;
    }
    .iter-input {
      width: 80px; padding: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: var(--mono); font-size: 13px; text-align: center;
    }
    .iter-input:focus { outline: none; border-color: var(--blue); }

    .action-bar {
      display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }
    .icon-btn {
      padding: 8px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-dim);
      font-family: var(--head); font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .icon-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .icon-btn.green:hover { border-color: var(--green); color: var(--green); }
    .icon-btn.blue  { color: var(--blue); border-color: rgba(59,130,246,0.3); }
    .icon-btn.blue:hover { border-color: var(--blue); }

    /* ── RESULTS COLUMN ── */
    .results-stack { display: flex; flex-direction: column; gap: 20px; }

    /* ── STAT CARDS ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 14px;
      text-align: center; transition: border-color 0.2s;
    }
    .kpi.primary { border-color: var(--amber-dim); background: var(--amber-bg); }
    .kpi-label {
      font-family: var(--head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); display: block; margin-bottom: 6px;
    }
    .kpi-value {
      font-family: var(--mono); font-size: 26px; font-weight: 600;
      color: var(--text); display: block;
    }
    .kpi.primary .kpi-value { color: var(--amber); }
    .kpi-unit {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      display: block; margin-top: 2px;
    }

    /* ── CHART ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    #chart { width: 100%; height: 280px; }
    .chart-footer {
      padding: 10px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 2px;
    }

    /* ── PERCENTILE TABLE ── */
    .perc-table { width: 100%; border-collapse: collapse; }
    .perc-table th {
      font-family: var(--head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); padding: 8px 12px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .perc-table td {
      font-family: var(--mono); font-size: 13px; color: var(--text);
      padding: 9px 12px; border-bottom: 1px solid var(--border);
    }
    .perc-table tr:last-child td { border-bottom: none; }
    .perc-table tr:hover td { background: var(--surface2); }
    .perc-bar-cell { width: 160px; }
    .perc-bar-bg { width: 100%; height: 4px; background: var(--border); border-radius: 2px; }
    .perc-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

    /* ── TASK BREAKDOWN ── */
    .breakdown-table { width: 100%; border-collapse: collapse; }
    .breakdown-table th {
      font-family: var(--head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
      padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .breakdown-table td {
      font-family: var(--mono); font-size: 13px;
      padding: 9px 12px; border-bottom: 1px solid var(--border);
    }
    .breakdown-table tr:last-child td { border-bottom: none; }
    .breakdown-table tr:hover td { background: var(--surface2); }
    .contrib-bar-wrap { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-top: 4px; }
    .contrib-bar-fill { height: 100%; border-radius: 3px; background: var(--blue); }

    /* ── RISK PANEL ── */
    .risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .risk-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px;
    }
    .risk-label {
      font-family: var(--head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
      display: block; margin-bottom: 6px;
    }
    .risk-value {
      font-family: var(--mono); font-size: 18px; font-weight: 600;
    }
    .risk-value.green { color: var(--green); }
    .risk-value.amber { color: var(--amber); }
    .risk-value.red   { color: var(--red); }

    .target-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
    }
    .target-input {
      width: 100px; padding: 7px 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: var(--mono); font-size: 13px;
      transition: border-color 0.2s;
    }
    .target-input:focus { outline: none; border-color: var(--purple); }
    .target-btn {
      padding: 7px 14px;
      background: var(--purple); color: white;
      border: none; border-radius: 6px;
      font-family: var(--head); font-size: 13px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.15s;
    }
    .target-btn:hover { opacity: 0.9; }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 12px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; opacity: 0.4; }
    .empty-text {
      font-family: var(--head); font-size: 14px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* placeholder for result panels */
    .placeholder-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="brand">Monte Carlo Simulator</div>
    <div class="brand-sub">Trimmer Assembly Line</div>
  </div>
  <div class="header-pill" id="header-status">Configure Tasks</div>
</header>

<div class="workspace">

  <!-- LEFT COLUMN: TASK INPUT -->
  <div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Project Tasks — Sequential</span>
        <a href="data_collection.html" style="
          display:flex;align-items:center;gap:6px;
          font-family:var(--head);font-size:12px;font-weight:700;
          letter-spacing:0.08em;text-transform:uppercase;
          color:var(--amber);text-decoration:none;
          padding:5px 10px;border:1px solid var(--amber-dim);
          border-radius:6px;transition:background 0.15s;
        " onmouseover="this.style.background='rgba(245,158,11,0.1)'"
           onmouseout="this.style.background='transparent'">
          ⏱ Collect Data
        </a>
      </div>
      <div class="panel-body">
        <div class="task-list" id="task-list"></div>
        <div style="margin-top:12px">
          <button class="add-task-btn" onclick="addTask()">+ Add Task</button>
        </div>

        <div class="task-controls">
          <div class="iter-group">
            <span class="iter-label">Iterations</span>
            <input type="number" class="iter-input" id="iterations" value="5000" min="100" max="100000">
          </div>
          <button class="run-btn" onclick="runSimulation()">▶ Run</button>
        </div>

        <div class="action-bar">
          <button class="icon-btn green" onclick="exportTasksCSV()">⬇ Task CSV</button>
          <button class="icon-btn" id="export-results-btn" onclick="exportResultsCSV()" style="display:none">⬇ Results CSV</button>
          <button class="icon-btn" onclick="clearAllTasks()" style="color:var(--red);border-color:rgba(239,68,68,0.3)">✕ Clear All</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN: RESULTS -->
  <div class="results-stack" id="results-stack">
    <div class="placeholder-panel">
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">Add tasks and run simulation</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;max-width:240px">
          Configure your task estimates on the left, then click Run to generate the Monte Carlo distribution.
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  /* ── State ── */
  let taskCount = 0;
  let simResults = [];

  /* ── Init ── */
  window.onload = () => {
    const saved = JSON.parse(localStorage.getItem('projectTasks') || '[]');
    if (saved.length) {
      saved.forEach(t => addTask(t.name, t.a, t.m, t.b, t));
    } else {
      addTask('Task 1', 3, 5, 8);
      addTask('Task 2', 2, 4, 9);
    }
  };

  /* ── Add Task ── */
  function addTask(name = '', opt = 1, ml = 5, pess = 10, meta = null) {
    taskCount++;
    if (!name) name = `Task ${taskCount}`;
    const id = `t-${Date.now()}-${taskCount}`;

    // extra badge info if came from data collection
    let badgeHTML = '';
    if (meta && meta.readings && meta.readings.length) {
      badgeHTML = `<div class="task-badge">
        <span>n=${meta.readings.length} cycles</span>
        ${meta.notes ? `<span title="${meta.notes}">📝 ${meta.notes.substring(0, 40)}${meta.notes.length > 40 ? '…' : ''}</span>` : ''}
        ${meta.timestamp ? `<span>${new Date(meta.timestamp).toLocaleString()}</span>` : ''}
      </div>`;
    }

    const html = `
      <div class="task-row" id="${id}">
        <input type="text" class="task-name-input" value="${name}" placeholder="Task name">
        <div class="num-group">
          <span class="num-label">Opt (a)</span>
          <input type="number" class="num-input opt" value="${opt}" step="0.01" min="0">
        </div>
        <div class="num-group">
          <span class="num-label">M. Likely</span>
          <input type="number" class="num-input ml" value="${ml}" step="0.01" min="0">
        </div>
        <div class="num-group">
          <span class="num-label">Pess (b)</span>
          <input type="number" class="num-input pess" value="${pess}" step="0.01" min="0">
        </div>
        <button class="del-btn" onclick="document.getElementById('${id}').remove()" title="Remove">×</button>
        ${badgeHTML}
      </div>
    `;
    document.getElementById('task-list').insertAdjacentHTML('beforeend', html);
  }

  function clearAllTasks() {
    if (!confirm('Delete all tasks?')) return;
    document.getElementById('task-list').innerHTML = '';
    taskCount = 0;
    localStorage.removeItem('projectTasks');
  }

  /* ── Triangular RNG ── */
  function triangular(a, m, b) {
    if (a >= b) return a;
    const U = Math.random(), F = (m - a) / (b - a);
    return U < F
      ? a + Math.sqrt(U * (b - a) * (m - a))
      : b - Math.sqrt((1 - U) * (b - a) * (b - m));
  }

  /* ── Run Simulation ── */
  function runSimulation() {
    const iters = parseInt(document.getElementById('iterations').value) || 1000;
    const tasks = [];

    document.querySelectorAll('.task-row').forEach(row => {
      const a = parseFloat(row.querySelector('.opt').value);
      const m = parseFloat(row.querySelector('.ml').value);
      const b = parseFloat(row.querySelector('.pess').value);
      const name = row.querySelector('.task-name-input').value || 'Task';
      if (!isNaN(a) && !isNaN(m) && !isNaN(b) && a <= m && m <= b) {
        tasks.push({ a, m, b, name });
      }
    });

    if (!tasks.length) { alert('Add at least one valid task (a ≤ m ≤ b).'); return; }

    simResults = [];
    const perTaskSums = tasks.map(() => 0);

    for (let i = 0; i < iters; i++) {
      let total = 0;
      tasks.forEach((t, j) => {
        const v = triangular(t.a, t.m, t.b);
        perTaskSums[j] += v;
        total += v;
      });
      simResults.push(total);
    }

    simResults.sort((a, b) => a - b);

    const taskMeans = tasks.map((t, j) => ({
      name: t.name,
      mean: perTaskSums[j] / iters,
      a: t.a, m: t.m, b: t.b
    }));

    renderResults(simResults, iters, tasks, taskMeans);
    document.getElementById('header-status').textContent = `${iters.toLocaleString()} iterations`;
    document.getElementById('export-results-btn').style.display = 'flex';

    // Save task state
    const rows = [];
    document.querySelectorAll('.task-row').forEach(row => {
      rows.push({
        name: row.querySelector('.task-name-input').value,
        a: parseFloat(row.querySelector('.opt').value),
        m: parseFloat(row.querySelector('.ml').value),
        b: parseFloat(row.querySelector('.pess').value),
      });
    });
    localStorage.setItem('projectTasks', JSON.stringify(rows));
  }

  /* ── Render Results ── */
  function renderResults(data, iters, tasks, taskMeans) {
    const mean = data.reduce((a, b) => a + b, 0) / iters;
    const variance = data.reduce((acc, v) => acc + (v - mean) ** 2, 0) / iters;
    const std = Math.sqrt(variance);

    const p = pct => data[Math.floor(iters * pct / 100)];
    const percentiles = [10, 25, 50, 75, 80, 85, 90, 95, 99];

    const totalMean = taskMeans.reduce((a, t) => a + t.mean, 0);

    document.getElementById('results-stack').innerHTML = `
      <!-- KPIs -->
      <div class="kpi-row">
        <div class="kpi primary">
          <span class="kpi-label">Expected (Mean)</span>
          <span class="kpi-value">${mean.toFixed(2)}</span>
          <span class="kpi-unit">units</span>
        </div>
        <div class="kpi">
          <span class="kpi-label">Minimum</span>
          <span class="kpi-value">${data[0].toFixed(2)}</span>
          <span class="kpi-unit">units</span>
        </div>
        <div class="kpi">
          <span class="kpi-label">Maximum</span>
          <span class="kpi-value">${data[iters - 1].toFixed(2)}</span>
          <span class="kpi-unit">units</span>
        </div>
        <div class="kpi">
          <span class="kpi-label">Std Deviation</span>
          <span class="kpi-value">${std.toFixed(2)}</span>
          <span class="kpi-unit">± units</span>
        </div>
      </div>

      <!-- Histogram -->
      <div class="chart-wrap panel">
        <div class="panel-header">
          <span class="panel-title">Distribution — Project Total Time</span>
        </div>
        <div id="chart"></div>
        <div class="chart-footer">
          <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Frequency</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Mean (${mean.toFixed(1)})</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>P90 (${p(90).toFixed(1)})</div>
        </div>
      </div>

      <!-- Two-column lower panels -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

        <!-- Percentile Table -->
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Percentile Breakdown</span></div>
          <div class="panel-body" style="padding:0">
            <table class="perc-table">
              <thead>
                <tr>
                  <th>Percentile</th>
                  <th>Time</th>
                  <th>Confidence</th>
                  <th class="perc-bar-cell">Visual</th>
                </tr>
              </thead>
              <tbody>
                ${percentiles.map(pc => {
                  const val = p(pc);
                  const pct = ((val - data[0]) / (data[iters - 1] - data[0]) * 100).toFixed(1);
                  const color = pc <= 50 ? 'var(--green)' : pc <= 80 ? 'var(--amber)' : 'var(--red)';
                  return `<tr>
                    <td style="color:var(--text-dim)">P${pc}</td>
                    <td style="font-weight:600">${val.toFixed(2)}</td>
                    <td style="color:${color}">${pc}%</td>
                    <td>
                      <div class="perc-bar-bg">
                        <div class="perc-bar-fill" style="width:${pct}%;background:${color}"></div>
                      </div>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Task Breakdown -->
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Task Contribution</span></div>
          <div class="panel-body" style="padding:0">
            <table class="breakdown-table">
              <thead>
                <tr>
                  <th>Task</th>
                  <th>Avg Time</th>
                  <th>% of Total</th>
                </tr>
              </thead>
              <tbody>
                ${taskMeans.map(t => {
                  const pct = (t.mean / totalMean * 100).toFixed(1);
                  return `<tr>
                    <td style="color:var(--text)">${t.name}</td>
                    <td>${t.mean.toFixed(2)}</td>
                    <td>
                      <span style="color:var(--blue)">${pct}%</span>
                      <div class="contrib-bar-wrap">
                        <div class="contrib-bar-fill" style="width:${pct}%"></div>
                      </div>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>

      </div>

      <!-- Risk / Target Panel -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Target Analysis</span></div>
        <div class="panel-body">
          <div class="target-row">
            <span style="font-family:var(--head);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)">Target Deadline:</span>
            <input type="number" class="target-input" id="target-val" placeholder="e.g. 25" step="0.1">
            <button class="target-btn" onclick="analyzeTarget()">Analyze</button>
          </div>
          <div class="risk-grid" id="risk-grid">
            <div class="risk-box">
              <span class="risk-label">P10 (Optimistic)</span>
              <span class="risk-value green">${p(10).toFixed(2)}</span>
            </div>
            <div class="risk-box">
              <span class="risk-label">P50 (Median)</span>
              <span class="risk-value amber">${p(50).toFixed(2)}</span>
            </div>
            <div class="risk-box">
              <span class="risk-label">P90 (Conservative)</span>
              <span class="risk-value red">${p(90).toFixed(2)}</span>
            </div>
            <div class="risk-box">
              <span class="risk-label">Coefficient of Variation</span>
              <span class="risk-value amber">${(std / mean * 100).toFixed(1)}%</span>
            </div>
          </div>
        </div>
      </div>
    `;

    drawHistogram(data, mean, p(90));
  }

  /* ── Target Analysis ── */
  function analyzeTarget() {
    const target = parseFloat(document.getElementById('target-val').value);
    if (isNaN(target) || !simResults.length) return;
    const pctBelow = (simResults.filter(v => v <= target).length / simResults.length * 100).toFixed(1);
    const color = pctBelow >= 90 ? 'green' : pctBelow >= 70 ? 'amber' : 'red';
    document.getElementById('risk-grid').innerHTML = `
      <div class="risk-box" style="grid-column:1/-1;border-color:var(--${color})">
        <span class="risk-label">Probability of completing within ${target} units</span>
        <span class="risk-value ${color}" style="font-size:2rem">${pctBelow}%</span>
      </div>
      <div class="risk-box">
        <span class="risk-label">Runs ≤ Target</span>
        <span class="risk-value">${simResults.filter(v => v <= target).length.toLocaleString()}</span>
      </div>
      <div class="risk-box">
        <span class="risk-label">Runs > Target</span>
        <span class="risk-value red">${simResults.filter(v => v > target).length.toLocaleString()}</span>
      </div>
    `;
  }

  /* ── Histogram ── */
  function drawHistogram(data, mean, p90) {
    const container = document.getElementById('chart');
    if (!container) return;
    container.innerHTML = '';

    const margin = { top: 18, right: 24, bottom: 36, left: 44 };
    const W = container.clientWidth - margin.left - margin.right;
    const H = container.clientHeight - margin.top - margin.bottom;

    const svg = d3.select('#chart').append('svg')
      .attr('width', W + margin.left + margin.right)
      .attr('height', H + margin.top + margin.bottom)
      .append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const x = d3.scaleLinear()
      .domain([d3.min(data) * 0.97, d3.max(data) * 1.03])
      .range([0, W]);

    const bins = d3.bin().domain(x.domain()).thresholds(x.ticks(50))(data);
    const y = d3.scaleLinear().range([H, 0]).domain([0, d3.max(bins, d => d.length)]);

    // Axes
    svg.append('g').attr('transform', `translate(0,${H})`)
      .call(d3.axisBottom(x).ticks(8).tickSize(-H))
      .call(g => {
        g.selectAll('line').attr('stroke', '#252b3b').attr('stroke-dasharray', '2,3');
        g.selectAll('text').attr('fill', '#6b7280').attr('font-family', 'IBM Plex Mono').attr('font-size', '11');
        g.select('.domain').attr('stroke', '#252b3b');
      });

    svg.append('g').call(d3.axisLeft(y).ticks(5))
      .call(g => {
        g.selectAll('text').attr('fill', '#6b7280').attr('font-family', 'IBM Plex Mono').attr('font-size', '11');
        g.select('.domain').attr('stroke', '#252b3b');
        g.selectAll('.tick line').attr('stroke', 'none');
      });

    // Bars with gradient-ish color based on position
    const maxBin = d3.max(bins, d => d.length);
    svg.selectAll('rect').data(bins).join('rect')
      .attr('x', d => x(d.x0) + 1)
      .attr('y', d => y(d.length))
      .attr('width', d => Math.max(0, x(d.x1) - x(d.x0) - 1))
      .attr('height', d => H - y(d.length))
      .attr('fill', d => {
        const xc = (d.x0 + d.x1) / 2;
        if (xc > p90) return '#ef4444';
        if (xc > mean) return '#f59e0b';
        return '#3b82f6';
      })
      .attr('opacity', 0.8)
      .attr('rx', 1);

    // Mean line
    svg.append('line')
      .attr('x1', x(mean)).attr('x2', x(mean))
      .attr('y1', 0).attr('y2', H)
      .attr('stroke', '#f59e0b').attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '4,3');

    // P90 line
    svg.append('line')
      .attr('x1', x(p90)).attr('x2', x(p90))
      .attr('y1', 0).attr('y2', H)
      .attr('stroke', '#ef4444').attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '4,3');
  }

  /* ── Exports ── */
  function exportTasksCSV() {
    const rows = [['Task','Optimistic','MostLikely','Pessimistic']];
    document.querySelectorAll('.task-row').forEach(row => {
      rows.push([
        row.querySelector('.task-name-input').value,
        row.querySelector('.opt').value,
        row.querySelector('.ml').value,
        row.querySelector('.pess').value
      ]);
    });
    downloadCSV(rows, 'Tasks_Input.csv');
  }

  function exportResultsCSV() {
    if (!simResults.length) return;
    const iters = simResults.length;
    const mean = simResults.reduce((a, b) => a + b, 0) / iters;
    const header = [['Iteration', 'TotalTime', 'CumulativePct']];
    const rows = simResults.map((v, i) => [i + 1, v.toFixed(4), ((i + 1) / iters * 100).toFixed(2)]);
    downloadCSV([...header, ...rows], 'Simulation_Results.csv');
  }

  function downloadCSV(rows, filename) {
    const csv = rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = filename; a.click();
  }
</script>
</body>
</html>
