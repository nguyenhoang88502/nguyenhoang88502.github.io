<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte Carlo Project Simulation</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; color: #333; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .task-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #eee; flex-wrap: wrap; }
        .task-row input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .task-row input.num { width: 70px; }
        .task-row input.name { width: 150px; font-weight: bold; }
        .task-row label { font-size: 0.9em; display: flex; flex-direction: column; }
        button { padding: 10px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .remove-btn { background-color: #e74c3c; padding: 5px 10px; }
        .controls { display: flex; gap: 15px; align-items: center; margin-top: 20px; justify-content: space-between; flex-wrap: wrap; }
        .action-group { display: flex; gap: 10px; align-items: center; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #e8f4f8; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #d0e7f0; }
        .stat-box span { display: block; font-size: 1.5em; font-weight: bold; color: #2c3e50; }
        #chart { width: 100%; height: 400px; }
        .export-results-btn { background-color: #27ae60; display: none; }
        .export-tasks-btn { background-color: #34495e; }
        .data-link { background-color: #8e44ad; }
    </style>
</head>
<body>

    <h1>Project Time Simulation</h1>
    
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin: 0;">Project Tasks (Sequential)</h2>
            <button onclick="goToDataCollection()" class="data-link">📊 Estimate Task from Data</button>
        </div>
        
        <div id="task-list"></div>
        
        <div style="display: flex; gap: 10px;">
            <button onclick="addTask()">+ Add Blank Task</button>
            <button onclick="clearAllTasks()" style="background-color: #95a5a6;">Clear All Tasks</button>
        </div>

        <div class="controls">
            <div class="action-group">
                <label><strong>Iterations:</strong> 
                <input type="number" id="iterations" value="1000" min="100" max="100000" style="padding: 5px; width: 80px;"></label>
                <button onclick="runSimulation()" style="background-color: #2ecc71;">▶ Run Simulation</button>
            </div>
            <div class="action-group">
                <button class="export-tasks-btn" onclick="exportTasksToExcel()">⬇ Export Task Data</button>
                <button class="export-results-btn" id="export-results-btn" onclick="exportResultsToExcel()">⬇ Export Simulation Results</button>
            </div>
        </div>
    </div>

    <div class="card" id="results-card" style="display: none;">
        <h2>Simulation Results</h2>
        <div class="stat-grid">
            <div class="stat-box">Expected (Mean)<br><span id="stat-mean">0</span></div>
            <div class="stat-box">Minimum Time<br><span id="stat-min">0</span></div>
            <div class="stat-box">Maximum Time<br><span id="stat-max">0</span></div>
            <div class="stat-box">90% Confidence<br><span id="stat-p90">0</span></div>
        </div>
        <div id="chart"></div>
    </div>

    <script>
        let taskCount = 0;
        let globalDurations = [];

        window.onload = () => {
            const savedTasks = JSON.parse(localStorage.getItem('projectTasks'));
            
            if (savedTasks && savedTasks.length > 0) {
                savedTasks.forEach(t => addTask(t.name, t.a, t.m, t.b));
            } else {
                addTask("Task 1", 3, 5, 8);
                addTask("Task 2", 2, 4, 9);
            }
        };

        function goToDataCollection() {
            const tasks = [];
            document.querySelectorAll('.task-row').forEach(row => {
                const name = row.querySelector('.name').value;
                const a = parseFloat(row.querySelector('.opt').value) || 0;
                const m = parseFloat(row.querySelector('.ml').value) || 0;
                const b = parseFloat(row.querySelector('.pess').value) || 0;
                tasks.push({ name, a, m, b });
            });
            
            localStorage.setItem('projectTasks', JSON.stringify(tasks));
            window.location.href = 'data_collection.html';
        }

        function clearAllTasks() {
            if (confirm("Are you sure you want to delete all tasks?")) {
                localStorage.removeItem('projectTasks');
                document.getElementById('task-list').innerHTML = '';
                taskCount = 0;
            }
        }

        function addTask(name = "", opt = 1, ml = 5, pess = 10) {
            taskCount++;
            if (!name) name = `Task ${taskCount}`;
            const id = `task-${Date.now()}-${taskCount}`;
            const html = `
                <div class="task-row" id="${id}">
                    <input type="text" class="name" value="${name}">
                    <label>Optimistic (a) <input type="number" class="opt num" value="${opt}" step="0.01"></label>
                    <label>Most Likely (m) <input type="number" class="ml num" value="${ml}" step="0.01"></label>
                    <label>Pessimistic (b) <input type="number" class="pess num" value="${pess}" step="0.01"></label>
                    <button class="remove-btn" onclick="document.getElementById('${id}').remove()">X</button>
                </div>
            `;
            document.getElementById('task-list').insertAdjacentHTML('beforeend', html);
        }

        // --- EXPORT TASK DATA TO CSV ---
        function exportTasksToExcel() {
            const tasks = [];
            document.querySelectorAll('.task-row').forEach(row => {
                const name = row.querySelector('.name').value.replace(/,/g, " "); // remove commas to protect CSV formatting
                const a = row.querySelector('.opt').value;
                const m = row.querySelector('.ml').value;
                const b = row.querySelector('.pess').value;
                tasks.push({ name, a, m, b });
            });

            if (tasks.length === 0) {
                alert("No tasks to export!");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,Task Name,Optimistic (Min),Most Likely (Avg),Pessimistic (Max)\n";
            tasks.forEach(t => {
                csvContent += `${t.name},${t.a},${t.m},${t.b}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Project_Tasks_Inputs.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function randomTriangular(a, m, b) {
            const U = Math.random();
            const F = (m - a) / (b - a);
            if (U < F) return a + Math.sqrt(U * (b - a) * (m - a));
            return b - Math.sqrt((1 - U) * (b - a) * (b - m));
        }

        function runSimulation() {
            const iterations = parseInt(document.getElementById('iterations').value);
            const tasks = [];
            
            document.querySelectorAll('.task-row').forEach(row => {
                const a = parseFloat(row.querySelector('.opt').value);
                const m = parseFloat(row.querySelector('.ml').value);
                const b = parseFloat(row.querySelector('.pess').value);
                if (a <= m && m <= b) tasks.push({ a, m, b });
            });

            if (tasks.length === 0) return;

            globalDurations = [];

            for (let i = 0; i < iterations; i++) {
                let totalTime = 0;
                for (let task of tasks) totalTime += randomTriangular(task.a, task.m, task.b);
                globalDurations.push(totalTime);
            }

            globalDurations.sort((x, y) => x - y);
            const mean = globalDurations.reduce((acc, val) => acc + val, 0) / iterations;
            
            document.getElementById('results-card').style.display = 'block';
            document.getElementById('export-results-btn').style.display = 'block';
            document.getElementById('stat-mean').innerText = mean.toFixed(2);
            document.getElementById('stat-min').innerText = globalDurations[0].toFixed(2);
            document.getElementById('stat-max').innerText = globalDurations[iterations - 1].toFixed(2);
            document.getElementById('stat-p90').innerText = globalDurations[Math.floor(iterations * 0.90)].toFixed(2);

            drawHistogram(globalDurations);
        }

        // --- EXPORT SIMULATION RESULTS TO CSV ---
        function exportResultsToExcel() {
            if (globalDurations.length === 0) return;
            
            let csvContent = "data:text/csv;charset=utf-8,Iteration,Total_Project_Time\n";
            globalDurations.forEach((time, index) => {
                csvContent += `${index + 1},${time.toFixed(4)}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Simulation_Results.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function drawHistogram(data) {
            const container = document.getElementById('chart');
            container.innerHTML = ''; 
            const margin = {top: 20, right: 30, bottom: 40, left: 40};
            const width = container.clientWidth - margin.left - margin.right;
            const height = container.clientHeight - margin.top - margin.bottom;

            const svg = d3.select("#chart").append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleLinear().domain([d3.min(data) * 0.95, d3.max(data) * 1.05]).range([0, width]);
            svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x));

            const histogram = d3.bin().domain(x.domain()).thresholds(x.ticks(40));
            const bins = histogram(data);

            const y = d3.scaleLinear().range([height, 0]).domain([0, d3.max(bins, d => d.length)]);
            svg.append("g").call(d3.axisLeft(y));

            svg.selectAll("rect").data(bins).join("rect").attr("x", 1)
                .attr("transform", d => `translate(${x(d.x0)}, ${y(d.length)})`)
                .attr("width", d => Math.max(0, x(d.x1) - x(d.x0) - 1))
                .attr("height", d => height - y(d.length))
                .style("fill", "#3498db").style("opacity", 0.8);
        }
    </script>
</body>
</html>
