<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Time Study — Data Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #181c27;
      --border:   #252b3b;
      --amber:    #f59e0b;
      --amber-dim:#92610a;
      --green:    #22c55e;
      --red:      #ef4444;
      --blue:     #3b82f6;
      --muted:    #6b7280;
      --text:     #e2e8f0;
      --text-dim: #94a3b8;
      --mono:     'IBM Plex Mono', monospace;
      --head:     'Barlow Condensed', sans-serif;
      --body:     'Barlow', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── TOP NAV ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--head); font-weight: 700; font-size: 13px;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--amber); text-decoration: none;
      padding: 6px 10px; border: 1px solid var(--amber-dim);
      border-radius: 4px;
      transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(245,158,11,0.1); }
    .topbar-title {
      font-family: var(--head); font-size: 18px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text);
    }
    .topbar-sub {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      margin-left: auto;
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .card-label {
      font-family: var(--head); font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }

    /* ── TASK NAME ── */
    .task-input {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--head); font-size: 20px; font-weight: 600;
      letter-spacing: 0.02em;
      transition: border-color 0.2s;
    }
    .task-input:focus { outline: none; border-color: var(--amber); }
    .task-input::placeholder { color: var(--muted); }

    /* ── STOPWATCH ── */
    .sw-display {
      font-family: var(--mono);
      font-size: clamp(3rem, 14vw, 5rem);
      font-weight: 600;
      text-align: center;
      color: var(--text);
      letter-spacing: 2px;
      padding: 10px 0 6px;
      transition: color 0.2s;
    }
    .sw-display.running { color: var(--green); }
    .sw-display.stopped { color: var(--amber); }

    .sw-status {
      text-align: center;
      font-family: var(--head); font-size: 12px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px; height: 18px;
    }

    .sw-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .sw-btn {
      padding: 14px 8px;
      border: none; border-radius: 8px;
      font-family: var(--head); font-size: 16px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      -webkit-user-select: none;
    }
    .sw-btn:active { transform: scale(0.95); opacity: 0.85; }
    .sw-start { background: var(--green); color: #0a1a0f; }
    .sw-stop  { background: var(--red);   color: #fff; }
    .sw-reset { background: #374151; color: var(--text-dim); }

    .record-btn {
      width: 100%; padding: 18px;
      border: none; border-radius: 10px;
      background: var(--amber); color: #1a0f00;
      font-family: var(--head); font-size: 20px; font-weight: 800;
      letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.15s, transform 0.1s, background 0.2s;
      -webkit-user-select: none;
    }
    .record-btn:active { transform: scale(0.97); }
    .record-btn.logged { background: var(--green); color: #0a1a0f; }
    .record-btn:disabled { background: #374151; color: var(--muted); cursor: not-allowed; }

    /* ── READINGS LIST ── */
    .readings-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .readings-count {
      font-family: var(--mono); font-size: 13px; color: var(--amber);
      background: rgba(245,158,11,0.1); padding: 2px 8px; border-radius: 20px;
    }
    .clear-link {
      font-family: var(--head); font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--red); cursor: pointer; padding: 4px 8px;
      border-radius: 4px; transition: background 0.15s;
    }
    .clear-link:hover { background: rgba(239,68,68,0.1); }

    .readings-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 200px; overflow-y: auto;
    }
    .reading-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reading-num {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      min-width: 28px;
    }
    .reading-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
    .reading-bar { height: 100%; background: var(--amber); border-radius: 2px; transition: width 0.3s; }
    .reading-val {
      font-family: var(--mono); font-size: 14px; font-weight: 600;
      color: var(--text); min-width: 60px; text-align: right;
    }
    .reading-del {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 2px 4px;
      border-radius: 4px; transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .reading-del:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    .no-readings {
      text-align: center; padding: 24px;
      font-family: var(--head); font-size: 14px; letter-spacing: 0.08em;
      color: var(--muted); text-transform: uppercase;
    }

    /* ── MANUAL INPUT & RAW DATA ── */
    .manual-row { display: flex; gap: 8px; }
    .manual-input {
      flex: 1; padding: 10px 12px; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 14px;
      transition: border-color 0.2s;
    }
    .manual-input:focus { outline: none; border-color: var(--blue); }
    .manual-input::placeholder { color: var(--muted); }
    .add-manual-btn {
      padding: 10px 14px; background: var(--blue); color: white; border: none; border-radius: 8px;
      font-family: var(--head); font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .add-manual-btn:active { opacity: 0.8; }
    
    .raw-data-area {
      width: 100%; padding: 10px 14px; background: #0f1117; border: 1.5px solid #252b3b;
      border-radius: 8px; color: var(--amber); font-family: var(--mono); font-size: 14px;
      resize: vertical; min-height: 60px; margin-top: 8px;
    }

    /* ── STATS ── */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .stat-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 10px; text-align: center;
    }
    .stat-box.highlight { border-color: var(--amber); }
    .stat-label {
      font-family: var(--head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); display: block; margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--mono); font-size: 20px; font-weight: 600;
      color: var(--text);
    }
    .stat-value.amber { color: var(--amber); }
    .stat-unit {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      display: block; margin-top: 2px;
    }

    /* ── NOTES ── */
    .notes-input {
      width: 100%; padding: 10px 14px; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--body); font-size: 14px;
      resize: vertical; min-height: 72px; transition: border-color 0.2s;
    }
    .notes-input:focus { outline: none; border-color: var(--blue); }
    .notes-input::placeholder { color: var(--muted); }

    /* ── BOTTOM ACTION BAR ── */
    .bottom-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      display: flex; gap: 10px;
    }
    .send-btn {
      flex: 1; padding: 16px; background: var(--green); color: #0a1a0f;
      border: none; border-radius: 10px; font-family: var(--head); font-size: 18px; font-weight: 800;
      letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s;
    }
    .send-btn:disabled { background: #374151; color: var(--muted); cursor: not-allowed; }
    .send-btn:not(:disabled):active { opacity: 0.85; }
    .export-btn {
      padding: 16px 14px; background: #374151; color: var(--text-dim); border: none; border-radius: 10px;
      font-family: var(--head); font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .export-btn:active { opacity: 0.8; }

    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--green);
      color: var(--green); padding: 10px 20px; border-radius: 999px;
      font-family: var(--head); font-size: 14px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← Sim</a>
  <span class="topbar-title">Time Study</span>
  <span class="topbar-sub" id="cycle-count">0 cycles</span>
</div>

<div class="scroll-area">

  <div class="card">
    <div class="card-label">Task / Process</div>
    <input type="text" class="task-input" id="task-name" placeholder="e.g. Assemble Housing Bottom">
  </div>

  <div class="card">
    <div class="card-label">Stopwatch</div>
    <div class="sw-display" id="sw-display">00:00.00</div>
    <div class="sw-status" id="sw-status">Ready</div>
    <div class="sw-controls">
      <button class="sw-btn sw-start" id="btn-start" onclick="startTimer()">Start</button>
      <button class="sw-btn sw-stop"  id="btn-stop"  onclick="stopTimer()">Stop</button>
      <button class="sw-btn sw-reset" onclick="resetTimer()">Reset</button>
    </div>
    <button class="record-btn" id="record-btn" onclick="recordTime()">
      <span id="record-icon">⏱</span>
      <span id="record-label">Record &amp; Reset</span>
    </button>
  </div>

  <div class="card">
    <div class="readings-header">
      <div class="card-label" style="margin-bottom:0">Cycle Readings</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="readings-count" id="readings-count">0</span>
        <span class="clear-link" onclick="clearReadings()">Clear All</span>
      </div>
    </div>
    
    <div class="readings-list" id="readings-list">
      <div class="no-readings" id="no-readings">No readings yet — start the stopwatch</div>
    </div>

    <div style="margin-top:12px; border-top: 1px solid var(--border); padding-top:12px;">
      <div class="card-label">All Cycle Numbers (Raw Data)</div>
      <textarea class="raw-data-area" id="raw-data-display" readonly placeholder="Your cycle numbers will appear here..." onclick="this.select()"></textarea>
    </div>

    <div style="margin-top:12px; border-top: 1px solid var(--border); padding-top:12px;">
      <div class="card-label">Add Manually (seconds)</div>
      <div class="manual-row">
        <input type="number" class="manual-input" id="manual-val" placeholder="e.g. 4.72" step="0.01" min="0">
        <button class="add-manual-btn" onclick="addManual()">+ Add</button>
      </div>
    </div>
  </div>

  <div class="card" id="stats-card" style="display:none">
    <div class="card-label">Live Statistics</div>
    <div class="stats-grid">
      <div class="stat-box">
        <span class="stat-label">Min</span>
        <span class="stat-value" id="s-min">—</span>
        <span class="stat-unit">sec</span>
      </div>
      <div class="stat-box highlight">
        <span class="stat-label">Average</span>
        <span class="stat-value amber" id="s-avg">—</span>
        <span class="stat-unit">sec</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Max</span>
        <span class="stat-value" id="s-max">—</span>
        <span class="stat-unit">sec</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Field Notes (optional)</div>
    <textarea class="notes-input" id="notes" placeholder="Operator, conditions, anomalies…"></textarea>
  </div>

</div>

<div class="bottom-bar">
  <button class="send-btn" id="send-btn" onclick="sendToSimulator()" disabled>
    ✓ Add to Simulation
  </button>
  <button class="export-btn" onclick="exportCSV()" title="Export CSV">⬇ CSV</button>
</div>

<div class="toast" id="toast"></div>

<script>
  let readings = [];
  let startTime, tInterval, difference = 0, running = false;

  window.onload = () => {
    const savedName = localStorage.getItem('pendingTaskName');
    if (savedName) document.getElementById('task-name').value = savedName;
  };

  function startTimer() {
    if (running) return;
    startTime = Date.now() - difference;
    tInterval = setInterval(tick, 16);
    running = true;
    document.getElementById('sw-display').className = 'sw-display running';
    document.getElementById('sw-status').textContent = 'Running…';
    document.getElementById('btn-start').style.opacity = '0.4';
  }

  function stopTimer() {
    if (!running) return;
    clearInterval(tInterval);
    running = false;
    document.getElementById('sw-display').className = 'sw-display stopped';
    document.getElementById('sw-status').textContent = 'Stopped — tap Record to log';
    document.getElementById('btn-start').style.opacity = '1';
  }

  function resetTimer() {
    clearInterval(tInterval);
    difference = 0; running = false;
    document.getElementById('sw-display').textContent = '00:00.00';
    document.getElementById('sw-display').className = 'sw-display';
    document.getElementById('sw-status').textContent = 'Ready';
    document.getElementById('btn-start').style.opacity = '1';
  }

  function tick() {
    difference = Date.now() - startTime;
    const ms = Math.floor((difference % 1000) / 10);
    const s  = Math.floor((difference / 1000) % 60);
    const m  = Math.floor(difference / 60000);
    document.getElementById('sw-display').textContent = pad(m) + ':' + pad(s) + '.' + pad(ms);
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  /* ── FLAWLESS SNAP-BACK LOGIC ── */
  function recordTime() {
    if (!running && difference === 0) { 
      showToast('Start the stopwatch first'); 
      return; 
    }
    
    // Calculate exact split
    let cycleTime = running ? (Date.now() - startTime) : difference;
    
    // Log the data
    if (cycleTime > 0) {
      const secs = +(cycleTime / 1000).toFixed(2);
      readings.push(secs);
      renderReadings();
    }

    if (running) {
      // Snap-Back Magic: We don't stop the setInterval engine. 
      // We just shift the starting line up to this exact millisecond.
      startTime = Date.now();
      document.getElementById('sw-status').textContent = 'Logged ✓ — Auto-started next cycle';
    } else {
      // If it was already stopped when they hit record, reset it to zero.
      difference = 0;
      document.getElementById('sw-display').textContent = '00:00.00';
      document.getElementById('sw-status').textContent = 'Logged ✓ — Ready';
    }

    // Button Flash Animation
    const btn = document.getElementById('record-btn');
    btn.classList.add('logged');
    document.getElementById('record-icon').textContent = '✔';
    document.getElementById('record-label').textContent = 'Logged!';
    setTimeout(() => {
      btn.classList.remove('logged');
      document.getElementById('record-icon').textContent = '⏱';
      document.getElementById('record-label').textContent = 'Record & Reset';
    }, 700);
  }

  function addManual() {
    const v = parseFloat(document.getElementById('manual-val').value);
    if (isNaN(v) || v <= 0) { showToast('Enter a valid time'); return; }
    readings.push(+v.toFixed(2));
    document.getElementById('manual-val').value = '';
    renderReadings();
  }

  function clearReadings() {
    if (!readings.length) return;
    if (!confirm('Clear all ' + readings.length + ' readings?')) return;
    readings = [];
    renderReadings();
  }

  function renderReadings() {
    const list = document.getElementById('readings-list');
    const noR  = document.getElementById('no-readings');
    const cnt  = document.getElementById('readings-count');
    const sendBtn = document.getElementById('send-btn');
    const rawBox = document.getElementById('raw-data-display');

    cnt.textContent = readings.length;
    document.getElementById('cycle-count').textContent = readings.length + ' cycle' + (readings.length !== 1 ? 's' : '');

    if (readings.length === 0) {
      noR.style.display = 'block';
      list.innerHTML = '';
      list.appendChild(noR);
      rawBox.value = "";
      document.getElementById('stats-card').style.display = 'none';
      sendBtn.disabled = true;
      return;
    }

    sendBtn.disabled = false;
    noR.style.display = 'none';

    // Update the visual bar list
    const maxVal = Math.max(...readings);
    list.innerHTML = readings.map((v, i) => `
      <div class="reading-item">
        <span class="reading-num">#${i + 1}</span>
        <div class="reading-bar-wrap">
          <div class="reading-bar" style="width:${(v / maxVal * 100).toFixed(1)}%"></div>
        </div>
        <span class="reading-val">${v.toFixed(2)}s</span>
        <button class="reading-del" onclick="deleteReading(${i})" title="Delete">×</button>
      </div>
    `).join('');

    // Keep the Raw Comma-Separated Data Box updated
    rawBox.value = readings.join(', ');

    updateStats();
    document.getElementById('stats-card').style.display = 'block';
  }

  function deleteReading(i) {
    readings.splice(i, 1);
    renderReadings();
  }

  function updateStats() {
    if (!readings.length) return;
    const n   = readings.length;
    const min = Math.min(...readings);
    const max = Math.max(...readings);
    const avg = readings.reduce((a, b) => a + b, 0) / n;
    
    document.getElementById('s-min').textContent = min.toFixed(2);
    document.getElementById('s-avg').textContent = avg.toFixed(2);
    document.getElementById('s-max').textContent = max.toFixed(2);
  }

  function sendToSimulator() {
    if (!readings.length) return;
    const name = document.getElementById('task-name').value.trim() || 'New Task';
    const min = Math.min(...readings);
    const max = Math.max(...readings);
    const avg = readings.reduce((a, b) => a + b, 0) / readings.length;

    const task = {
      name,
      a: +min.toFixed(2),
      m: +avg.toFixed(2),
      b: +max.toFixed(2)
    };

    const saved = JSON.parse(localStorage.getItem('projectTasks') || '[]');
    saved.push(task);
    localStorage.setItem('projectTasks', JSON.stringify(saved));
    window.location.href = 'index.html';
  }

  function exportCSV() {
    if (!readings.length) { showToast('No data to export'); return; }
    const name = document.getElementById('task-name').value.trim() || 'task';
    let csv = 'Cycle,Time_sec\n';
    readings.forEach((v, i) => csv += `${i + 1},${v}\n`);
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = name.replace(/\s+/g, '_') + '_readings.csv';
    a.click(); URL.revokeObjectURL(url);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
