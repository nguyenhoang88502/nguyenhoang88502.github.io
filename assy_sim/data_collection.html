<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Data Collection</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; font-family: monospace; }
        .results { margin-top: 20px; padding: 15px; background: #e8f4f8; border-radius: 6px; border: 1px solid #d0e7f0; display: none; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .calc-btn { background-color: #f39c12; }
        .send-btn { background-color: #2ecc71; display: none; }
        .back-btn { background-color: #95a5a6; text-decoration: none; display: inline-block; text-align: center; }
        
        /* Stopwatch Styles */
        .stopwatch-container { background: #2c3e50; padding: 20px; border-radius: 6px; margin-top: 15px; text-align: center; color: white; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .time-display { font-size: 2.5em; font-weight: bold; font-family: 'Courier New', Courier, monospace; margin-bottom: 15px; letter-spacing: 2px; }
        .sw-btn { padding: 8px 15px; margin: 0 5px; color: white; }
        .sw-start { background-color: #27ae60; }
        .sw-stop { background-color: #e74c3c; }
        .sw-reset { background-color: #7f8c8d; }
        .sw-record { background-color: #3498db; width: 100%; margin-top: 15px; padding: 12px; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Process Time Study Collection</h2>
        
        <label>Task / Process Name:</label>
        <input type="text" id="task-name" placeholder="e.g., Assemble Housing Bottom">

        <div class="stopwatch-container">
            <div class="time-display" id="display">00:00.00</div>
            <div>
                <button class="sw-btn sw-start" onclick="startTimer()">Start</button>
                <button class="sw-btn sw-stop" onclick="stopTimer()">Stop</button>
                <button class="sw-btn sw-reset" onclick="resetTimer()">Reset</button>
            </div>
            <button class="sw-btn sw-record" id="record-btn" onclick="recordTime()">⏱ Record Cycle Time to Data</button>
        </div>

        <label>Raw Data Points (in seconds):</label>
        <textarea id="raw-data" placeholder="Use the stopwatch or type manually: 4.50, 5.23, 4.81"></textarea>

        <div class="btn-group">
            <button class="calc-btn" onclick="calculateParameters()">Calculate Parameters</button>
            <a href="index.html" class="back-btn">Back to Simulator</a>
        </div>

        <div class="results" id="results-panel">
            <h3>Calculated Parameters</h3>
            <p><strong>Optimistic (Min):</strong> <span id="calc-min">0</span> sec</p>
            <p><strong>Most Likely (Average):</strong> <span id="calc-avg">0</span> sec</p>
            <p><strong>Pessimistic (Max):</strong> <span id="calc-max">0</span> sec</p>
            
            <button class="send-btn" id="send-btn" onclick="sendToSimulator()">Add to Project Simulation</button>
        </div>
    </div>

    <script>
        // --- STOPWATCH LOGIC ---
        let startTime, updatedTime, difference = 0, tInterval;
        let running = false;

        function startTimer() {
            if (!running) {
                startTime = new Date().getTime() - difference;
                tInterval = setInterval(updateTime, 10);
                running = true;
            }
        }

        function stopTimer() {
            if (running) {
                clearInterval(tInterval);
                running = false;
            }
        }

        function resetTimer() {
            clearInterval(tInterval);
            difference = 0;
            running = false;
            document.getElementById('display').innerText = "00:00.00";
        }

        function updateTime() {
            updatedTime = new Date().getTime();
            difference = updatedTime - startTime;
            
            let minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((difference % (1000 * 60)) / 1000);
            let milliseconds = Math.floor((difference % 1000) / 10);
            
            minutes = (minutes < 10) ? "0" + minutes : minutes;
            seconds = (seconds < 10) ? "0" + seconds : seconds;
            milliseconds = (milliseconds < 10) ? "0" + milliseconds : milliseconds;
            
            document.getElementById('display').innerText = minutes + ':' + seconds + '.' + milliseconds;
        }

        function recordTime() {
            if (difference === 0) return; // Ignore if stopwatch is at 0
            
            // Convert to total seconds with 2 decimal places
            let totalSeconds = (difference / 1000).toFixed(2);
            let textArea = document.getElementById('raw-data');
            
            // Append to text area
            if (textArea.value.trim() === "") {
                textArea.value = totalSeconds;
            } else {
                textArea.value += ", " + totalSeconds;
            }
            
            // Button flash animation to confirm recording
            let btn = document.getElementById('record-btn');
            let originalText = btn.innerText;
            btn.innerText = "✔ Recorded!";
            btn.style.backgroundColor = "#27ae60";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "#3498db";
            }, 600);
        }

        // --- DATA CALCULATION LOGIC ---
        let taskData = {};

        function calculateParameters() {
            const rawInput = document.getElementById('raw-data').value;
            const nameInput = document.getElementById('task-name').value || "New Task";
            
            const dataPoints = rawInput.split(',')
                .map(n => parseFloat(n.trim()))
                .filter(n => !isNaN(n));

            if (dataPoints.length === 0) {
                alert("Please enter or record valid numeric data points.");
                return;
            }

            const min = Math.min(...dataPoints);
            const max = Math.max(...dataPoints);
            const sum = dataPoints.reduce((acc, val) => acc + val, 0);
            const avg = sum / dataPoints.length;

            taskData = {
                name: nameInput,
                a: min.toFixed(2),
                m: avg.toFixed(2),
                b: max.toFixed(2)
            };

            document.getElementById('calc-min').innerText = taskData.a;
            document.getElementById('calc-avg').innerText = taskData.m;
            document.getElementById('calc-max').innerText = taskData.b;
            
            document.getElementById('results-panel').style.display = 'block';
            document.getElementById('send-btn').style.display = 'inline-block';
        }

        function sendToSimulator() {
            let savedTasks = JSON.parse(localStorage.getItem('projectTasks')) || [];
            savedTasks.push(taskData);
            localStorage.setItem('projectTasks', JSON.stringify(savedTasks));
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
